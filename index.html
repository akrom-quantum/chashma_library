<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chashma — Thought Room</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --hdr:      #065f46;
  --hdr-2:    #047857;
  --hdr-text: #ecfdf5;
  --hdr-mute: #6ee7b7;
  --hdr-dim:  #a7f3d0;
  --amber:    #d97706;
  --amber-bg: #fffbeb;
  --amber-pale:#fef3c7;
  --amber-border:#fde68a;
  --am-dark:  #92400e;
  --ink:      #111110;
  --ink-2:    #3a3935;
  --ink-3:    #6b6860;
  --ink-4:    #9e9b96;
  --paper:    #faf9f6;
  --paper-2:  #f2f0ec;
  --rule:     #e8e5df;
  --rule-2:   #dedad3;
  --em:       #059669;
  --em-dark:  #065f46;
  --em-pale:  #d1fae5;
  --em-glow:  rgba(5,150,105,0.1);
  --card:     #ffffff;
  --r:        16px;
}
[data-theme="dark"] {
  --hdr:      #022c22;
  --hdr-2:    #065f46;
  --hdr-text: #ecfdf5;
  --hdr-mute: #34d399;
  --hdr-dim:  #6ee7b7;
  --amber:    #f59e0b;
  --amber-bg: #1c1400;
  --amber-pale:rgba(245,158,11,0.12);
  --amber-border:rgba(245,158,11,0.3);
  --am-dark:  #fcd34d;
  --ink:      #f0ede8;
  --ink-2:    #c8c4bc;
  --ink-3:    #8a857d;
  --ink-4:    #5a5650;
  --paper:    #0f0f0e;
  --paper-2:  #161613;
  --rule:     #252320;
  --rule-2:   #2a2925;
  --em:       #10b981;
  --em-dark:  #059669;
  --em-pale:  rgba(16,185,129,0.13);
  --em-glow:  rgba(16,185,129,0.1);
  --card:     #161613;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lora',serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
button{font-family:'Lora',serif;cursor:pointer;border:none;background:none;}
input,textarea,select{font-family:'Lora',serif;}
a{color:var(--em);text-decoration:none;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--rule-2);border-radius:3px;}

/* ── MASTHEAD ── */
.masthead{background:var(--hdr);position:sticky;top:0;z-index:200;}
.mast-inner{padding:0 40px;}
.mast-top{display:flex;align-items:flex-end;justify-content:space-between;padding:18px 0 14px;gap:16px;flex-wrap:wrap;}
.wordmark{flex:1;}
.wordmark-name{font-size:1.5rem;font-weight:700;font-style:italic;letter-spacing:-0.02em;color:var(--hdr-text);line-height:1.2;}
.wordmark-sub{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.22em;color:var(--hdr-mute);margin-top:4px;}
.mast-counters{display:flex;gap:20px;align-items:flex-end;flex-shrink:0;}
.cnt{text-align:center;}
.cnt-n{font-size:1.6rem;font-weight:700;font-style:italic;color:var(--hdr-mute);line-height:1;}
.cnt-l{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.16em;color:var(--hdr-dim);margin-top:2px;}
.mast-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.icon-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:var(--hdr-mute);font-size:0.95rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.icon-btn:hover{border-color:var(--hdr-mute);color:var(--hdr-text);}
.tab-nav{display:flex;border-top:1px solid rgba(255,255,255,0.1);}
.tab-btn{padding:9px 20px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.16em;font-weight:700;color:var(--hdr-mute);background:none;cursor:pointer;position:relative;transition:all .15s;border:none;}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--hdr-text);transform:scaleX(0);transition:transform .2s;}
.tab-btn.active{color:var(--hdr-text);}
.tab-btn.active::after{transform:scaleX(1);}
.tab-btn:hover{color:var(--hdr-text);}
.tab-btn.mem-tab{color:#fcd34d;}
.tab-btn.mem-tab.active{color:#fcd34d;}
.tab-btn.mem-tab::after{background:#fcd34d;}

/* ── PAGE ── */
.page{display:none;}.page.active{display:block;}

/* ── CMDBAR ── */
.cmdbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:18px 40px 0;}
.search-wrap{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;border:1px solid var(--rule-2);border-radius:var(--r);padding:7px 14px;background:var(--card);transition:border-color .2s,box-shadow .2s;}
.search-wrap:focus-within{border-color:var(--em);box-shadow:0 0 0 3px var(--em-glow);}
.search-wrap svg{color:var(--ink-4);flex-shrink:0;}
.search-wrap input{border:none;background:none;color:var(--ink);font-size:0.84rem;outline:none;width:100%;font-family:'Lora',serif;}
.search-wrap input::placeholder{color:var(--ink-4);font-style:italic;}
.pill-grp{display:flex;gap:4px;}
.pill{padding:6px 13px;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;color:var(--ink-3);border:1px solid var(--rule-2);border-radius:var(--r);background:var(--card);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{color:var(--ink);border-color:var(--ink-3);}
.pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

/* Sort controls */
.sort-bar{display:flex;align-items:center;gap:6px;padding:10px 40px 0;flex-wrap:wrap;}
.sort-lbl{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--ink-4);}
.sort-sel{font-size:0.68rem;padding:5px 12px;border:1px solid var(--rule-2);border-radius:var(--r);background:var(--card);color:var(--ink-3);font-family:'Lora',serif;cursor:pointer;outline:none;transition:border-color .2s;}
.sort-sel:focus{border-color:var(--em);}
.sort-dir{padding:5px 12px;font-size:0.68rem;font-weight:700;border:1px solid var(--rule-2);border-radius:var(--r);background:var(--card);color:var(--ink-3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-dir:hover{border-color:var(--em);color:var(--em);}
.sort-dir.asc::after{content:' ↑';}
.sort-dir.desc::after{content:' ↓';}

.btn-outline{padding:6px 13px;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;border:1px solid var(--rule-2);border-radius:var(--r);color:var(--ink-3);background:var(--card);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-outline:hover{color:var(--ink);border-color:var(--ink-3);}
.btn-primary{padding:6px 16px;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;background:var(--em);color:#fff;border:1px solid var(--em);border-radius:var(--r);cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-primary:hover{background:var(--em-dark);}
.btn-amber{padding:6px 16px;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;background:var(--amber);color:#fff;border:1px solid var(--amber);border-radius:var(--r);cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-amber:hover{background:var(--am-dark);}

/* Tag strip */
.tag-strip{display:flex;gap:5px;flex-wrap:wrap;padding:10px 40px 0;}
.htag{font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;padding:3px 11px;border:1px solid var(--rule-2);border-radius:var(--r);color:var(--ink-4);background:var(--card);cursor:pointer;transition:all .15s;font-weight:700;}
.htag:hover{border-color:var(--em);color:var(--em);}
.htag.active{background:var(--em);border-color:var(--em);color:#fff;}
.htag.amber-tag.active{background:var(--amber);border-color:var(--amber);color:#fff;}

/* ── ESSAY LIST ── */
.content-list{padding:10px 40px 80px;}
.essay-entry{border-bottom:1px solid var(--rule);padding:18px 0;display:flex;gap:16px;animation:fadeUp .3s ease both;transition:background .15s;}
.essay-entry:hover{background:var(--paper-2);margin:0 -12px;padding:18px 12px;}
.entry-num{font-size:2.6rem;font-weight:700;font-style:italic;color:var(--rule-2);line-height:1;min-width:50px;text-align:right;padding-top:2px;transition:color .2s;user-select:none;flex-shrink:0;}
.essay-entry:hover .entry-num{color:var(--em);}
.entry-body{flex:1;min-width:0;}
.entry-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.entry-date{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--ink-4);}
.entry-badges{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;}
.ebadge{font-size:0.56rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;padding:2px 8px;border-radius:var(--r);}
.eb-read{background:var(--em-pale);border:1px solid var(--em);color:var(--em-dark);}
.eb-new{background:var(--em);color:#fff;}
.eb-unread{background:var(--paper-2);border:1px solid var(--rule-2);color:var(--ink-4);}
.entry-title{font-size:1.1rem;font-weight:700;font-style:italic;line-height:1.3;color:var(--ink);margin-bottom:7px;}
.entry-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.entry-tag{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;padding:2px 7px;border:1px solid var(--rule-2);color:var(--ink-4);border-radius:var(--r);font-weight:700;}
.entry-stats{display:flex;align-items:center;gap:14px;margin-bottom:11px;font-size:0.68rem;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.1em;flex-wrap:wrap;}
.entry-stats strong{color:var(--em);font-style:italic;font-size:0.82rem;text-transform:none;letter-spacing:0;}
.stars{display:flex;gap:2px;}
.star{font-size:0.72rem;color:var(--rule-2);}
.star.on{color:#d4a017;}
.entry-actions{display:flex;gap:5px;flex-wrap:wrap;}
.act{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;border:1px solid var(--rule-2);border-radius:var(--r);color:var(--ink-3);background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.act:hover{border-color:var(--ink-3);color:var(--ink);}
.act-orig{background:var(--hdr);border-color:var(--hdr);color:var(--hdr-text);}
.act-orig:hover{background:var(--hdr-2);border-color:var(--hdr-2);color:var(--hdr-text);}
.act-essay{border-color:var(--em);color:var(--em);}
.act-essay:hover{background:var(--em-pale);}
.act-read:hover{border-color:var(--em);color:var(--em);}
.act-edit:hover{border-color:#c8960a;color:#c8960a;}
.act-del:hover{border-color:#c53030;color:#c53030;}
.act.dim{opacity:.22;pointer-events:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── POST / READING ENTRY ── */
.post-entry,.reading-entry{border-bottom:1px solid var(--rule);padding:16px 0;animation:fadeUp .3s ease both;transition:background .15s;}
.post-entry:hover,.reading-entry:hover{background:var(--paper-2);margin:0 -12px;padding:16px 12px;}
.post-head,.reading-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.plat,.rtype{font-size:0.56rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;padding:3px 9px;border-radius:var(--r);flex-shrink:0;}
.plat-twitter{background:#e8f4fe;color:#1a6fa8;border:1px solid #bde0fa;}
.plat-telegram{background:#e5f4fb;color:#006699;border:1px solid #b3d9f0;}
.plat-substack{background:#fff3e0;color:#c05000;border:1px solid #fdd8a0;}
.plat-youtube{background:#fde8e8;color:#aa0000;border:1px solid #f8b8b8;}
.plat-other,.rtype-other{background:var(--paper-2);color:var(--ink-3);border:1px solid var(--rule-2);}
[data-theme="dark"] .plat-twitter{background:rgba(26,140,216,.13);border-color:rgba(26,140,216,.3);color:#60b4f0;}
[data-theme="dark"] .plat-telegram{background:rgba(0,136,204,.13);border-color:rgba(0,136,204,.3);color:#50c0e8;}
[data-theme="dark"] .plat-substack{background:rgba(212,93,0,.13);border-color:rgba(212,93,0,.3);color:#f0a060;}
[data-theme="dark"] .plat-youtube{background:rgba(204,0,0,.13);border-color:rgba(204,0,0,.3);color:#f06060;}
.rtype-book{background:#ede8fe;color:#4c2daa;border:1px solid #c4b5fd;}
.rtype-article{background:#fef3c7;color:#7a3200;border:1px solid #fde68a;}
.rtype-video{background:#fce7f3;color:#831843;border:1px solid #fbcfe8;}
.rtype-podcast{background:#e0f2fe;color:#0a4f75;border:1px solid #bae6fd;}
[data-theme="dark"] .rtype-book{background:rgba(91,63,188,.13);border-color:rgba(91,63,188,.3);color:#c4a0ff;}
[data-theme="dark"] .rtype-article{background:rgba(146,64,14,.13);border-color:rgba(146,64,14,.3);color:#fcd34d;}
[data-theme="dark"] .rtype-video{background:rgba(157,23,77,.13);border-color:rgba(157,23,77,.3);color:#f9a8d4;}
[data-theme="dark"] .rtype-podcast{background:rgba(7,89,133,.13);border-color:rgba(7,89,133,.3);color:#7dd3fc;}
.post-author,.reading-author{font-size:0.88rem;font-weight:700;font-style:italic;color:var(--ink);}
.post-icons,.reading-icons{margin-left:auto;display:flex;gap:4px;}
.post-content,.reading-content-text{font-size:0.86rem;line-height:1.75;color:var(--ink-2);font-style:italic;border-left:2px solid var(--em);padding-left:13px;margin-bottom:9px;}
.reading-content-text{border-left-color:#7c3aed;}
.post-stats,.reading-stats{display:flex;align-items:center;gap:12px;margin-bottom:9px;font-size:0.68rem;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.1em;}
.post-stats strong,.reading-stats strong{color:var(--em);font-style:italic;font-size:0.82rem;text-transform:none;letter-spacing:0;}
.post-actions,.reading-actions{display:flex;gap:5px;flex-wrap:wrap;}
.act-source{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;background:var(--hdr);color:var(--hdr-text);border-radius:var(--r);border:1px solid var(--hdr);text-decoration:none;transition:background .15s;display:inline-flex;align-items:center;gap:4px;}
.act-source:hover{background:var(--hdr-2);text-decoration:none;color:var(--hdr-text);}
.act-rsource{font-size:0.64rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:5px 12px;background:#7c3aed;color:#fff;border-radius:var(--r);border:1px solid #7c3aed;text-decoration:none;transition:background .15s;display:inline-flex;align-items:center;gap:4px;}
.act-rsource:hover{background:#6d28d9;text-decoration:none;color:#fff;}

/* ── MEMORY ENTRY ── */
.mem-entry{border-bottom:1px solid var(--rule);padding:16px 0;animation:fadeUp .3s ease both;transition:background .15s;}
.mem-entry:hover{background:var(--amber-bg);margin:0 -12px;padding:16px 12px;}
.mem-num{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--amber);margin-bottom:4px;}
.mem-title{font-size:1rem;font-weight:700;font-style:italic;color:var(--ink);margin-bottom:5px;line-height:1.3;}
.mem-text{font-size:0.86rem;line-height:1.75;color:var(--ink-2);font-style:italic;border-left:2px solid var(--amber);padding-left:13px;margin-bottom:9px;}
.mem-meta{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--ink-4);margin-bottom:8px;}
.mem-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.mem-tag{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;padding:2px 7px;border:1px solid var(--amber-border);color:var(--am-dark);border-radius:var(--r);font-weight:700;background:var(--amber-pale);}
.mem-stats{display:flex;align-items:center;gap:12px;margin-bottom:9px;font-size:0.68rem;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.1em;}
.mem-stats strong{color:var(--amber);font-style:italic;font-size:0.82rem;text-transform:none;letter-spacing:0;}
.mem-stars .star.on{color:var(--amber);}
.mem-actions{display:flex;gap:5px;flex-wrap:wrap;}
.act-mem-edit:hover{border-color:var(--amber);color:var(--amber);}
.act-mem-del:hover{border-color:#c53030;color:#c53030;}

/* ── MEMORY WRITER (full page panel) ── */
.memory-writer{display:none;position:fixed;inset:0;background:var(--paper);z-index:500;flex-direction:column;}
.memory-writer.open{display:flex;}
.writer-header{background:var(--amber);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.writer-header h2{font-size:1rem;font-weight:700;font-style:italic;color:#fff;letter-spacing:-0.01em;}
.writer-header-actions{display:flex;gap:8px;}
.writer-btn-discard{padding:7px 18px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;border:1px solid rgba(255,255,255,0.5);border-radius:var(--r);color:#fff;background:transparent;cursor:pointer;transition:all .15s;}
.writer-btn-discard:hover{background:rgba(255,255,255,0.15);}
.writer-btn-save{padding:7px 18px;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;border:1px solid #fff;border-radius:var(--r);color:var(--amber);background:#fff;cursor:pointer;transition:all .15s;}
.writer-btn-save:hover{background:#fffbeb;}
.writer-body{flex:1;display:flex;flex-direction:column;gap:16px;padding:28px 40px;overflow-y:auto;max-width:860px;width:100%;}
.writer-field label{display:block;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-4);margin-bottom:6px;}
.writer-field label .opt{text-transform:none;letter-spacing:0;font-weight:400;font-style:italic;font-size:0.68rem;color:var(--ink-4);}
.writer-field input{width:100%;padding:10px 14px;font-size:0.95rem;border:1px solid var(--rule-2);border-radius:12px;background:var(--card);color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Lora',serif;}
.writer-field input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,0.12);}
.writer-textarea{width:100%;flex:1;min-height:280px;padding:16px;font-size:0.95rem;border:1px solid var(--rule-2);border-radius:12px;background:var(--card);color:var(--ink);outline:none;resize:vertical;line-height:1.8;transition:border-color .2s,box-shadow .2s;font-family:'Lora',serif;font-style:italic;}
.writer-textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(217,119,6,0.12);}
.writer-tabs{display:flex;gap:4px;margin-bottom:4px;}
.writer-tab{padding:6px 14px;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;border:1px solid var(--rule-2);border-radius:var(--r);color:var(--ink-3);background:var(--card);cursor:pointer;transition:all .15s;}
.writer-tab.active{background:var(--amber);border-color:var(--amber);color:#fff;}

/* ── EMPTY ── */
.empty{padding:80px 40px;text-align:center;color:var(--ink-4);}
.empty-rule{width:40px;height:3px;background:var(--rule-2);margin:0 auto 14px;}
.empty p{font-style:italic;font-size:0.92rem;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-top:4px solid var(--em);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.22);border-radius:0 0 12px 12px;animation:mIn .22s ease;}
.modal.amber-modal{border-top-color:var(--amber);}
.modal.wide-modal{max-width:780px;}
@keyframes mIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.mhead{padding:20px 24px 15px;border-bottom:1px solid var(--rule-2);display:flex;align-items:baseline;justify-content:space-between;}
.mhead h2{font-size:1rem;font-weight:700;font-style:italic;color:var(--ink);}
.mclose{font-size:1rem;color:var(--ink-4);padding:4px 8px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;transition:all .15s;}
.mclose:hover{color:var(--ink);border-color:var(--rule-2);}
.mbody{padding:20px 24px;}
.fg{margin-bottom:15px;}
.fg label{display:block;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-4);margin-bottom:5px;}
.fg label .req{color:var(--em);}
.fg label .opt{color:var(--ink-4);text-transform:none;letter-spacing:0;font-weight:400;font-style:italic;font-size:0.66rem;}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;font-size:0.86rem;border:1px solid var(--rule-2);border-radius:12px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Lora',serif;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-glow);}
.fg textarea{min-height:110px;resize:vertical;line-height:1.65;}
.fg-row{display:flex;gap:12px;}.fg-row .fg{flex:1;}
.mfoot{padding:13px 24px 20px;border-top:1px solid var(--rule-2);display:flex;justify-content:flex-end;gap:8px;}

/* MD viewer */
.md-toolbar{padding:10px 24px;border-bottom:1px solid var(--rule-2);display:flex;gap:8px;justify-content:flex-end;}
.md-body{padding:28px 36px 48px;font-size:0.92rem;line-height:1.85;color:var(--ink-2);}
.md-body h1{font-size:1.7rem;font-style:italic;color:var(--em);margin:0 0 18px;line-height:1.2;}
.md-body h2{font-size:1.12rem;font-weight:700;color:var(--ink);margin:26px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--rule-2);}
.md-body h3{font-size:0.98rem;font-weight:600;font-style:italic;color:var(--ink);margin:20px 0 6px;}
.md-body p{margin:0 0 12px;}
.md-body blockquote{margin:18px 0;padding:14px 18px 14px 22px;background:var(--em-pale);border-left:4px solid var(--em);font-style:italic;color:var(--ink-2);position:relative;border-radius:0 8px 8px 0;}
.md-body blockquote::before{content:'\u201C';position:absolute;top:4px;left:6px;font-size:2.6rem;color:var(--em);opacity:.18;line-height:1;}
.obs-badge{display:inline-block;padding:1px 7px;background:var(--em-pale);border:1px solid var(--em);color:var(--em-dark);font-size:.76em;font-weight:600;border-radius:var(--r);font-style:normal;}
.md-body ul,.md-body ol{padding-left:20px;margin:0 0 12px;}.md-body li{margin:4px 0;}
.md-body strong{font-weight:700;color:var(--ink);}
.md-body a{color:var(--em);text-decoration:underline;}
.md-body code{background:var(--paper-2);border:1px solid var(--rule-2);padding:1px 5px;font-size:.8em;border-radius:5px;font-style:normal;}
.md-footnotes{margin-top:40px;padding-top:16px;border-top:2px solid var(--rule-2);font-size:.78rem;color:var(--ink-3);}
.md-footnotes h4{font-size:.6rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink-4);margin-bottom:10px;font-weight:700;}
.fn-item{display:flex;gap:7px;margin:5px 0;}.fn-n{color:var(--em);font-weight:700;min-width:20px;}
sup.fn-ref{color:var(--em);font-size:.66em;font-weight:700;}

/* Rate modal */
.rate-body{padding:24px;text-align:center;}
.rate-body p{font-size:.85rem;font-style:italic;color:var(--ink-3);margin-bottom:20px;}
.rate-row{display:flex;gap:8px;justify-content:center;margin-bottom:12px;}
.rstar{font-size:2rem;color:var(--rule-2);cursor:pointer;transition:color .12s,transform .12s;line-height:1;}
.rstar:hover,.rstar.sel{color:#d4a017;transform:scale(1.15);}
.rstar.amber-star:hover,.rstar.amber-star.sel{color:var(--amber);}
.rate-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-4);height:16px;font-weight:700;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--paper);padding:10px 16px;font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;border-left:4px solid var(--em);border-radius:0 8px 8px 0;max-width:320px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.amber{border-left-color:var(--amber);}

@media(max-width:700px){
  .masthead .mast-inner,.cmdbar,.sort-bar,.tag-strip,.content-list{padding-left:16px;padding-right:16px;}
  .mast-top{flex-wrap:wrap;gap:10px;}
  .mast-counters{gap:12px;}
  .cnt-n{font-size:1.2rem;}
  .writer-body{padding:20px 16px;}
  .writer-header{padding:14px 16px;}
}

<script>
(function(){
'use strict';

/* ── STORAGE ── */
function lsG(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function lsS(k,v){localStorage.setItem(k,JSON.stringify(v));}
var essays   = lsG('ch4_essays')   || [];
var posts    = lsG('ch4_posts')    || [];
var readings = lsG('ch4_readings') || [];
var memories = lsG('ch4_memories') || [];
function sE(){lsS('ch4_essays',essays);}
function sP(){lsS('ch4_posts',posts);}
function sR(){lsS('ch4_readings',readings);}
function sM(){lsS('ch4_memories',memories);}

/* ── STATE ── */
var eFilter='all', pFilter='all', rFilter='all';
var eSort='num', pSort='date', rSort='date', mSort='num';
var eDir=1, pDir=1, rDir=1, mDir=1;
var activeTag=null, activeMemTag=null;
var editEssayId=null, editPostId=null, editReadingId=null, editMemId=null;
var pendingRateId=null, pendingRateType=null, pickedStar=0;
var mdHtml='', mdTitle='';
var writerMode='write';

/* ── THEME ── */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').innerHTML=t==='dark'?'&#9728;':'&#127769;';lsS('ch4_theme',t);}
document.getElementById('themeBtn').addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});
applyTheme(lsG('ch4_theme')||'light');

/* ── TABS ── */
function switchTab(t){
  ['essays','posts','readings','memories'].forEach(function(x){
    var tn=x.charAt(0).toUpperCase()+x.slice(1);
    document.getElementById('tab'+tn).classList.toggle('active',x===t);
    document.getElementById('page-'+x).classList.toggle('active',x===t);
  });
  updateCounters();
  if(t==='essays')renderEssays();
  else if(t==='posts')renderPosts();
  else if(t==='readings')renderReadings();
  else renderMemories();
}
document.getElementById('tabEssays').addEventListener('click',function(){switchTab('essays');});
document.getElementById('tabPosts').addEventListener('click',function(){switchTab('posts');});
document.getElementById('tabReadings').addEventListener('click',function(){switchTab('readings');});
document.getElementById('tabMemories').addEventListener('click',function(){switchTab('memories');});

/* ── COUNTERS ── */
function updateCounters(){
  document.getElementById('cEssays').textContent=essays.length;
  document.getElementById('cPosts').textContent=posts.length;
  document.getElementById('cReadings').textContent=readings.length;
  document.getElementById('cMemories').textContent=memories.length;
}

/* ── FILTERS ── */
['all','unread','read'].forEach(function(f){document.getElementById('ef-'+f).addEventListener('click',function(){eFilter=f;document.querySelectorAll('#page-essays .pill').forEach(function(b){b.classList.remove('active');});this.classList.add('active');renderEssays();});});
['all','twitter','telegram','substack','youtube'].forEach(function(f){document.getElementById('pf-'+f).addEventListener('click',function(){pFilter=f;document.querySelectorAll('#page-posts .pill').forEach(function(b){b.classList.remove('active');});this.classList.add('active');renderPosts();});});
['all','book','article','video','podcast'].forEach(function(f){document.getElementById('rf-'+f).addEventListener('click',function(){rFilter=f;document.querySelectorAll('#page-readings .pill').forEach(function(b){b.classList.remove('active');});this.classList.add('active');renderReadings();});});

/* ── SEARCH ── */
document.getElementById('essaySearch').addEventListener('input',renderEssays);
document.getElementById('postSearch').addEventListener('input',renderPosts);
document.getElementById('readingSearch').addEventListener('input',renderReadings);
document.getElementById('memSearch').addEventListener('input',renderMemories);

/* ── SORT ── */
document.getElementById('essaySortBy').addEventListener('change',function(){eSort=this.value;renderEssays();});
document.getElementById('postSortBy').addEventListener('change',function(){pSort=this.value;renderPosts();});
document.getElementById('readingSortBy').addEventListener('change',function(){rSort=this.value;renderReadings();});
document.getElementById('memSortBy').addEventListener('change',function(){mSort=this.value;renderMemories();});

function bindDirBtn(id, getDir, setDir, render){
  document.getElementById(id).addEventListener('click',function(){
    setDir(getDir()*-1);
    this.classList.toggle('asc',getDir()===1);
    this.classList.toggle('desc',getDir()===-1);
    render();
  });
}
bindDirBtn('essaySortDir',function(){return eDir;},function(v){eDir=v;},renderEssays);
bindDirBtn('postSortDir',function(){return pDir;},function(v){pDir=v;},renderPosts);
bindDirBtn('readingSortDir',function(){return rDir;},function(v){rDir=v;},renderReadings);
bindDirBtn('memSortDir',function(){return mDir;},function(v){mDir=v;},renderMemories);

/* ── ADD BUTTONS ── */
document.getElementById('btnAddE').addEventListener('click',openAddEssay);
document.getElementById('btnAddP').addEventListener('click',openAddPost);
document.getElementById('btnAddR').addEventListener('click',openAddReading);
document.getElementById('btnAddM').addEventListener('click',openWriter);
document.getElementById('btnExportE').addEventListener('click',exportEssays);
document.getElementById('btnExportP').addEventListener('click',exportPosts);
document.getElementById('btnExportR').addEventListener('click',exportReadings);
document.getElementById('btnExportM').addEventListener('click',exportMemories);

/* ── MODAL WIRING ── */
document.getElementById('closeEssay').addEventListener('click',function(){closeOv('ov-essay');});
document.getElementById('cancelEssay').addEventListener('click',function(){closeOv('ov-essay');});
document.getElementById('saveEssayBtn').addEventListener('click',saveEssay);
document.getElementById('closePost').addEventListener('click',function(){closeOv('ov-post');});
document.getElementById('cancelPost').addEventListener('click',function(){closeOv('ov-post');});
document.getElementById('savePostBtn').addEventListener('click',savePost);

/* ── MARKDOWN PARSER ── */
function parseMd(raw){
  if(!raw)return '';
  var md=raw,fnDefs={},fnCount=0,fnList=[];
  md=md.replace(/^\[\^([\w]+)\]:\s*(.+)$/gm,function(_,id,txt){fnDefs[id]=txt;return '';});
  md=md.replace(/\[\^([\w]+)\]/g,function(_,id){fnCount++;fnList.push({id:id,n:fnCount});return '<sup class="fn-ref">['+fnCount+']</sup>';});
  md=md.replace(/\[\[([^\]]+)\]\]/g,function(_,t){return '<span class="obs-badge">'+t+'</span>';});
  md=md.replace(/^>\s*\[!quote\][^\n]*\n((?:>.*\n?)*)/gim,function(_,body){return '<blockquote>'+body.replace(/^>\s?/gm,'').trim()+'</blockquote>\n';});
  md=md.replace(/^((?:>[^\n]*\n?)+)/gm,function(block){return '<blockquote>'+block.replace(/^>\s?/gm,'').trim()+'</blockquote>\n';});
  md=md.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  md=md.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  md=md.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  md=md.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  md=md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  md=md.replace(/\*(.+?)\*/g,'<em>$1</em>');
  md=md.replace(/__(.+?)__/g,'<strong>$1</strong>');
  md=md.replace(/_(.+?)_/g,'<em>$1</em>');
  md=md.replace(/`([^`]+)`/g,'<code>$1</code>');
  md=md.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  md=md.replace(/(^|[\s,])(https?:\/\/[^\s<"]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  md=md.replace(/(^|\s)(#[a-zA-Z0-9_\u0400-\u04FF]+)/g,'$1<span class="obs-badge">$2</span>');
  md=md.replace(/^[-*+] (.+)$/gm,'<li>$1</li>');
  md=md.replace(/(<li>[\s\S]*?<\/li>\n?)+/g,function(m){return '<ul>'+m+'</ul>';});
  md=md.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  md=md.replace(/^---$/gm,'<hr>');
  md=md.replace(/\n{2,}/g,'\n</p><p>');
  md='<p>'+md+'</p>';
  ['blockquote','ul','h1','h2','h3','hr'].forEach(function(tag){
    md=md.replace(new RegExp('<p>(<'+tag+'[ >])','g'),'$1');
    md=md.replace(new RegExp('(<\\/'+tag+'>)<\\/p>','g'),'$1');
  });
  md=md.replace(/<p>\s*<\/p>/g,'');
  var fnHtml='';
  if(fnList.length){fnHtml='<div class="md-footnotes"><h4>Sources &amp; References</h4>';fnList.forEach(function(item){var def=fnDefs[item.id]||item.id;def=def.replace(/(https?:\/\/[^\s<"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');fnHtml+='<div class="fn-item"><span class="fn-n">['+item.n+']</span><span>'+def+'</span></div>';});fnHtml+='</div>';}
  return md+fnHtml;
}

/* ── HELPERS ── */
function avgRating(arr){if(!arr||!arr.length)return NaN;return arr.reduce(function(s,r){return s+r;},0)/arr.length;}
function starsHtml(avg,cls){return [1,2,3,4,5].map(function(n){return '<span class="star'+((!isNaN(avg)&&n<=Math.round(avg))?' on':'')+' '+(cls||'')+'">&#9733;</span>';}).join('');}
function sortData(data,by,dir){
  return data.slice().sort(function(a,b){
    var va,vb;
    if(by==='num'){va=a.num||0;vb=b.num||0;}
    else if(by==='rating'){va=avgRating(a.ratings)||0;vb=avgRating(b.ratings)||0;}
    else if(by==='reads'){va=a.readCount||0;vb=b.readCount||0;}
    else{va=a.createdAt||a.date||'';vb=b.createdAt||b.date||'';}
    if(va<vb)return -1*dir;
    if(va>vb)return 1*dir;
    return 0;
  });
}

function renderEssays(){
  var list=document.getElementById('essayList');
  var q=document.getElementById('essaySearch').value.toLowerCase();
  var data=essays.slice();
  if(q)data=data.filter(function(e){return String(e.num).includes(q)||e.title.toLowerCase().includes(q)||(e.tags||[]).some(function(t){return t.toLowerCase().includes(q);});});
  if(eFilter==='read')data=data.filter(function(e){return e.read;});
  if(eFilter==='unread')data=data.filter(function(e){return !e.read;});
  if(activeTag)data=data.filter(function(e){return (e.tags||[]).includes(activeTag);});
  data=sortData(data,eSort,eDir);

  updateCounters();

  /* tag strip */
  var allTags=[];
  essays.forEach(function(e){(e.tags||[]).forEach(function(t){if(!allTags.includes(t))allTags.push(t);});});allTags.sort();
  var strip=document.getElementById('tagStrip');strip.innerHTML='';
  if(allTags.length){var ab=document.createElement('button');ab.className='htag'+(activeTag?'':' active');ab.textContent='All';ab.addEventListener('click',function(){activeTag=null;renderEssays();});strip.appendChild(ab);allTags.forEach(function(t){var btn=document.createElement('button');btn.className='htag'+(activeTag===t?' active':'');btn.textContent=t;btn.addEventListener('click',function(){activeTag=activeTag===t?null:t;renderEssays();});strip.appendChild(btn);});}

  list.innerHTML='';
  if(!data.length){list.innerHTML='<div class="empty"><div class="empty-rule"></div><p>No essays found.</p></div>';return;}
  var latest=Math.max.apply(null,essays.map(function(e){return e.num;}));

  data.forEach(function(e,i){
    var rc=e.readCount||0,avg=avgRating(e.ratings),avgStr=isNaN(avg)?'&mdash;':avg.toFixed(1);
    var isNew=e.num===latest&&!e.read,hasE=!!e.myEssayMd,hasA=!!e.analysisMd;
    var badge=isNew?'<span class="ebadge eb-new">New</span>':e.read?'<span class="ebadge eb-read">&#10003; Read</span>':'<span class="ebadge eb-unread">Unread</span>';
    var tagsH=(e.tags||[]).map(function(t){return '<span class="entry-tag">'+t+'</span>';}).join('');
    var el=document.createElement('div');el.className='essay-entry';el.style.animationDelay=(i*0.025)+'s';
    var h='<div class="entry-num">'+String(e.num).padStart(2,'0')+'</div><div class="entry-body">';
    h+='<div class="entry-eyebrow"><span class="entry-date">'+e.date+'</span><div class="entry-badges">'+badge+'</div></div>';
    h+='<div class="entry-title">'+e.title+'</div>';
    if(tagsH)h+='<div class="entry-tags">'+tagsH+'</div>';
    h+='<div class="entry-stats"><span>Read&nbsp;<strong>'+rc+'&times;</strong></span><div class="stars">'+starsHtml(avg)+'</div><strong style="color:var(--em)">'+avgStr+'</strong></div>';
    h+='<div class="entry-actions">';
    h+='<button class="act act-orig" data-id="'+e.id+'" data-action="orig">&#8599; Original</button>';
    h+='<button class="act act-essay'+(hasE?'':' dim')+'" data-id="'+e.id+'" data-action="essay">&#128196; Essay</button>';
    h+='<button class="act'+(hasA?'':' dim')+'" data-id="'+e.id+'" data-action="analysis">&#128269; Analysis</button>';
    h+='<button class="act act-read" data-id="'+e.id+'" data-action="read">'+(e.read?'&#8629; Unread':'&#10003; Read')+'</button>';
    h+='<button class="act act-edit" data-id="'+e.id+'" data-action="edit">&#9998;</button>';
    h+='<button class="act act-del" data-id="'+e.id+'" data-action="del">&#10005;</button>';
    h+='</div></div>';
    el.innerHTML=h;list.appendChild(el);
  });
  list.querySelectorAll('.act').forEach(function(btn){btn.addEventListener('click',function(){var id=this.getAttribute('data-id'),act=this.getAttribute('data-action');if(act==='orig')openOrig(id);else if(act==='essay')openMd(id,'essay');else if(act==='analysis')openMd(id,'analysis');else if(act==='read')toggleRead(id);else if(act==='edit')openEditEssay(id);else if(act==='del')delEssay(id);});});
}

  var RLBL={book:'Book',article:'Article',video:'Video',podcast:'Podcast',other:'Other'};
  data.forEach(function(r,i){
    var avg=avgRating(r.ratings),avgStr=isNaN(avg)?'&mdash;':avg.toFixed(1);
    var el=document.createElement('div');el.className='reading-entry';el.style.animationDelay=(i*0.025)+'s';
    var h='<div class="reading-head"><span class="rtype rtype-'+r.type+'">'+(RLBL[r.type]||r.type)+'</span>';
    h+='<span class="reading-author">'+r.author+'</span>';
    h+='<div class="reading-icons"><button class="act act-edit" style="padding:4px 9px;" data-id="'+r.id+'" data-action="rate">&#9733; Rate</button><button class="act act-edit" style="padding:4px 9px;" data-id="'+r.id+'" data-action="edit">&#9998;</button><button class="act act-del" style="padding:4px 9px;" data-id="'+r.id+'" data-action="del">&#10005;</button></div></div>';
    h+='<div class="reading-content-text">'+r.content+'</div>';
    h+='<div class="reading-stats"><div class="stars">'+starsHtml(avg)+'</div><strong style="color:#7c3aed">'+avgStr+'</strong></div>';
    h+='<div class="reading-actions"><a class="act-rsource" href="'+r.url+'" target="_blank" rel="noopener">&#8599; View Source</a></div>';
    el.innerHTML=h;list.appendChild(el);
  });
  list.querySelectorAll('[data-action]').forEach(function(btn){btn.addEventListener('click',function(){var id=this.getAttribute('data-id'),act=this.getAttribute('data-action');if(act==='edit')openEditReading(id);else if(act==='del')delReading(id);else if(act==='rate')openRateModal(id,'reading');});});
}

function openAddReading(){editReadingId=null;document.getElementById('mReadingTitle').textContent='Add Reading';['rAuthor','rContent','rUrl'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('rType').value='book';openOv('ov-reading');}
function openEditReading(id){var r=readings.find(function(x){return x.id===id;});if(!r)return;editReadingId=id;document.getElementById('mReadingTitle').textContent='Edit Reading';document.getElementById('rAuthor').value=r.author;document.getElementById('rType').value=r.type;document.getElementById('rContent').value=r.content;document.getElementById('rUrl').value=r.url;openOv('ov-reading');}
function saveReading(){
  var author=document.getElementById('rAuthor').value.trim(),type=document.getElementById('rType').value,content=document.getElementById('rContent').value.trim(),url=document.getElementById('rUrl').value.trim();
  if(!author||!content||!url){showToast('Fill all required fields');return;}
  var now=new Date().toISOString().slice(0,10);
  if(editReadingId){var r=readings.find(function(x){return x.id===editReadingId;});if(!r)return;Object.assign(r,{author:author,type:type,content:content,url:url});showToast('Reading updated');}
  else{readings.push({id:'r_'+Date.now(),author:author,type:type,content:content,url:url,createdAt:now,ratings:[]});showToast('Reading added');}
  sR();updateCounters();closeOv('ov-reading');renderReadings();
}
function delReading(id){if(!confirm('Remove this reading?'))return;readings=readings.filter(function(x){return x.id!==id;});sR();updateCounters();renderReadings();showToast('Reading removed');}

/* ── RENDER MEMORIES ── */
function renderMemories(){
  var list=document.getElementById('memList');
  var q=document.getElementById('memSearch').value.toLowerCase();
  var data=memories.slice();
  if(q)data=data.filter(function(m){return (m.title||'').toLowerCase().includes(q)||m.content.toLowerCase().includes(q)||(m.tags||[]).some(function(t){return t.toLowerCase().includes(q);});});
  if(activeMemTag)data=data.filter(function(m){return (m.tags||[]).includes(activeMemTag);});
  data=sortData(data,mSort,mDir);

  /* mem tag strip */
  var allTags=[];
  memories.forEach(function(m){(m.tags||[]).forEach(function(t){if(!allTags.includes(t))allTags.push(t);});});allTags.sort();
  var strip=document.getElementById('memTagStrip');strip.innerHTML='';
  if(allTags.length){var ab=document.createElement('button');ab.className='htag amber-tag'+(activeMemTag?'':' active');ab.textContent='All';ab.addEventListener('click',function(){activeMemTag=null;renderMemories();});strip.appendChild(ab);allTags.forEach(function(t){var btn=document.createElement('button');btn.className='htag amber-tag'+(activeMemTag===t?' active':'');btn.textContent=t;btn.addEventListener('click',function(){activeMemTag=activeMemTag===t?null:t;renderMemories();});strip.appendChild(btn);});}

  list.innerHTML='';
  if(!data.length){list.innerHTML='<div class="empty"><div class="empty-rule"></div><p>No memories yet. Click + Memory to write your first one.</p></div>';return;}

  data.forEach(function(m,i){
    var avg=avgRating(m.ratings),avgStr=isNaN(avg)?'&mdash;':avg.toFixed(1);
    var tagsH=(m.tags||[]).map(function(t){return '<span class="mem-tag">'+t+'</span>';}).join('');
    var el=document.createElement('div');el.className='mem-entry';el.style.animationDelay=(i*0.025)+'s';
    var h='<div class="mem-num">Memory #'+String(m.num).padStart(2,'0')+'</div>';
    if(m.title)h+='<div class="mem-title">'+m.title+'</div>';
    h+='<div class="mem-meta">'+m.createdAt+(m.updatedAt&&m.updatedAt!==m.createdAt?' &middot; edited '+m.updatedAt:'')+'</div>';
    if(tagsH)h+='<div class="mem-tags">'+tagsH+'</div>';
    var preview=m.content.length>280?m.content.slice(0,280)+'&hellip;':m.content;
    h+='<div class="mem-text">'+preview+'</div>';
    h+='<div class="mem-stats"><div class="stars mem-stars">'+starsHtml(avg)+'</div><strong style="color:var(--amber)">'+avgStr+'</strong></div>';
    h+='<div class="mem-actions">';
    h+='<button class="act act-mem-edit" data-id="'+m.id+'" data-action="rate">&#9733; Rate</button>';
    h+='<button class="act act-mem-edit" data-id="'+m.id+'" data-action="edit">&#9998; Edit</button>';
    h+='<button class="act act-mem-del" data-id="'+m.id+'" data-action="del">&#10005;</button>';
    h+='</div>';
    el.innerHTML=h;list.appendChild(el);
  });
  list.querySelectorAll('[data-action]').forEach(function(btn){btn.addEventListener('click',function(){var id=this.getAttribute('data-id'),act=this.getAttribute('data-action');if(act==='edit')openWriter(id);else if(act==='del')delMemory(id);else if(act==='rate')openRateModal(id,'memory');});});
}
function delMemory(id){if(!confirm('Remove this memory?'))return;memories=memories.filter(function(x){return x.id!==id;});sM();updateCounters();renderMemories();showToast('Memory removed','amber');}

/* ── CLIPBOARD EXPORT ── */
function toTsv(rows){var h=Object.keys(rows[0]);var lines=[h.join('\t')];rows.forEach(function(r){lines.push(h.map(function(k){return String(r[k]===null||r[k]===undefined?'':r[k]).replace(/\t/g,' ');}).join('\t'));});return lines.join('\n');}
function copyToClip(text,label){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){showToast(label+' copied \u2014 paste into Google Sheets');}).catch(function(){fallbackCopy(text,label);});
  } else {fallbackCopy(text,label);}
}
function fallbackCopy(text,label){var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');showToast(label+' copied \u2014 paste into Google Sheets');}catch(e){showToast('Copy failed \u2014 try Firefox');}document.body.removeChild(ta);}

function exportEssays(){if(!essays.length){showToast('No essays');return;}var rows=essays.slice().sort(function(a,b){return a.num-b.num;}).map(function(e){var avg=avgRating(e.ratings);return{'No.':e.num,'Title':e.title,'Date':e.date||'','Link':e.url,'Tags':(e.tags||[]).join(' '),'Read':e.read?'Yes':'No','Read Count':e.readCount||0,'Avg Rating':isNaN(avg)?'':avg.toFixed(1)};});copyToClip(toTsv(rows),'Essays');}
function exportPosts(){if(!posts.length){showToast('No posts');return;}var rows=posts.map(function(p){var avg=avgRating(p.ratings);return{'Author':p.author,'Platform':p.platform,'Content':p.content,'Link':p.url,'Avg Rating':isNaN(avg)?'':avg.toFixed(1)};});copyToClip(toTsv(rows),'Posts');}
function exportReadings(){if(!readings.length){showToast('No readings');return;}var rows=readings.map(function(r){var avg=avgRating(r.ratings);return{'Author':r.author,'Type':r.type,'Notes':r.content,'Link':r.url,'Avg Rating':isNaN(avg)?'':avg.toFixed(1)};});copyToClip(toTsv(rows),'Readings');}
function exportMemories(){if(!memories.length){showToast('No memories','amber');return;}var rows=memories.slice().sort(function(a,b){return a.num-b.num;}).map(function(m){var avg=avgRating(m.ratings);return{'#':m.num,'Title':m.title||'','Date':m.createdAt,'Tags':(m.tags||[]).join(' '),'Content':m.content,'Avg Rating':isNaN(avg)?'':avg.toFixed(1)};});copyToClip(toTsv(rows),'Memories');}

/* ── TOAST ── */
var _tt;
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg.toUpperCase();
  t.className='toast'+(type==='amber'?' amber':'')+' show';
  clearTimeout(_tt);
  _tt=setTimeout(function(){t.classList.remove('show');},2600);
}

/* ── INIT ── */
updateCounters();
renderEssays();

})();
</script>
